<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soru Havuzu</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14; --surface:#13161e; --surface2:#1a1e2a; --border:#252836;
    --accent:#e8b45a; --accent2:#5a8fe8; --text:#e8e4dc; --muted:#6b7080;
    --danger:#e85a5a; --success:#5ae8a0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(232,180,90,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,180,90,.03) 1px,transparent 1px);
    background-size:40px 40px;}
  .container{max-width:1100px;margin:0 auto;padding:0 32px;position:relative;z-index:1;}

  /* Header */
  header{padding:48px 0 32px;border-bottom:1px solid var(--border);margin-bottom:48px;}
  .header-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;}
  .logo{display:flex;flex-direction:column;gap:4px;}
  .logo-tag{font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
  .logo-title{font-family:'DM Serif Display',serif;font-size:42px;line-height:1;}
  .logo-title span{color:var(--accent);font-style:italic;}
  .stats-bar{display:flex;gap:32px;}
  .stat{text-align:right;}
  .stat-num{font-family:'DM Serif Display',serif;font-size:28px;color:var(--accent);line-height:1;}
  .stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}

  /* Layout */
  .main-grid{display:grid;grid-template-columns:380px 1fr;gap:32px;align-items:start;}

  /* Panel */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:2px;overflow:hidden;}
  .panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .panel-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .panel-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .panel-body{padding:24px;}

  /* Form */
  .form-group{margin-bottom:20px;}
  .form-label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:12px 14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;}
  .form-input:focus{border-color:var(--accent);}
  .form-input::placeholder{color:var(--muted);}

  /* Drop zone */
  .drop-zone{border:1px dashed var(--border);border-radius:2px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2);}
  .drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(232,180,90,.04);}
  .drop-icon{font-size:28px;margin-bottom:10px;display:block;}
  .drop-text{font-size:12px;color:var(--muted);line-height:1.6;}
  .drop-text strong{color:var(--accent);font-weight:500;}
  .file-selected{margin-top:12px;padding:10px 14px;background:rgba(232,180,90,.08);border:1px solid rgba(232,180,90,.2);border-radius:2px;font-size:12px;color:var(--accent);display:flex;align-items:center;gap:8px;}
  .file-change{margin-left:auto;font-size:10px;color:var(--muted);cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
  .file-change:hover{color:var(--accent);}

  /* Count buttons */
  .count-row{display:flex;gap:8px;margin-bottom:20px;}
  .count-btn{flex:1;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;text-align:center;}
  .count-btn:hover{border-color:var(--accent);color:var(--accent);}
  .count-btn.active{background:rgba(232,180,90,.1);border-color:var(--accent);color:var(--accent);}

  /* Generate button */
  .btn-generate{width:100%;padding:14px;background:var(--accent);border:none;border-radius:2px;color:#0d0f14;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
  .btn-generate:hover:not(:disabled){background:#f0c46a;transform:translateY(-1px);}
  .btn-generate:disabled{opacity:.4;cursor:not-allowed;}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(13,15,20,.3);border-top-color:#0d0f14;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Topics */
  .topic-chip{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:2px;margin-bottom:6px;cursor:pointer;transition:all .2s;}
  .topic-chip:hover{border-color:var(--accent2);}
  .topic-chip.active{border-color:var(--accent2);background:rgba(90,143,232,.06);}
  .topic-name{font-size:12px;color:var(--text);}
  .topic-count{font-size:10px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:20px;}
  .topic-regen-btn{font-size:9px;letter-spacing:1px;color:var(--accent2);background:rgba(90,143,232,.1);border:1px solid rgba(90,143,232,.25);border-radius:20px;padding:3px 10px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s;white-space:nowrap;}
  .topic-regen-btn:hover{background:rgba(90,143,232,.22);border-color:var(--accent2);}

  /* Pool */
  .pool-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .pool-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);}
  .pool-actions{display:flex;gap:8px;}
  .btn-sm{padding:8px 14px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
  .btn-sm:hover{border-color:var(--accent);color:var(--accent);}
  .btn-danger{border-color:rgba(232,90,90,.3);color:var(--danger);}
  .btn-danger:hover{border-color:var(--danger);background:rgba(232,90,90,.06);color:var(--danger);}

  /* Filter tabs */
  .filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .filter-tab{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
  .filter-tab:hover{border-color:var(--accent2);color:var(--accent2);}
  .filter-tab.active{background:rgba(90,143,232,.1);border-color:var(--accent2);color:var(--accent2);}

  /* Question card */
  .question-card{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:20px 24px;margin-bottom:10px;transition:border-color .2s;animation:fadeIn .3s ease;}
  .question-card:hover{border-color:rgba(232,180,90,.2);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .question-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .q-topic{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);background:rgba(90,143,232,.1);border:1px solid rgba(90,143,232,.2);padding:3px 10px;border-radius:20px;}
  .q-num{font-size:11px;color:var(--muted);}
  .q-time{font-size:10px;color:var(--muted);margin-left:auto;}
  .question-text{font-family:'Fraunces',serif;font-size:15px;line-height:1.7;color:var(--text);font-weight:300;}
  .question-actions{display:flex;gap:16px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;}
  .q-btn{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;transition:color .2s;padding:0;}
  .q-btn:hover{color:var(--accent);}
  .q-btn.delete:hover{color:var(--danger);}
  .q-btn.src:hover,.q-btn.src.active{color:var(--accent2);}

  /* Options */
  .q-options{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
  .q-option{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:2px;cursor:pointer;transition:all .15s;}
  .q-option:hover:not(.correct):not(.wrong):not(.dimmed){border-color:var(--accent2);background:rgba(90,143,232,.06);}
  .q-opt-label{font-size:11px;font-weight:500;color:var(--accent2);min-width:18px;text-align:center;}
  .q-opt-text{font-size:13px;color:var(--text);line-height:1.4;}
  .q-option.correct{border-color:rgba(90,232,160,.5);background:rgba(90,232,160,.08);}
  .q-option.correct .q-opt-label,.q-option.correct .q-opt-text{color:var(--success);}
  .q-option.wrong{border-color:rgba(232,90,90,.4);background:rgba(232,90,90,.07);}
  .q-option.wrong .q-opt-label,.q-option.wrong .q-opt-text{color:var(--danger);text-decoration:line-through;opacity:.7;}
  .q-option.dimmed{opacity:.35;}
  .answered .q-option{cursor:default;}

  /* Source box */
  .q-source-box{margin-top:12px;border-radius:2px;overflow:hidden;animation:fadeIn .2s ease;}
  .source-loading{padding:12px 14px;font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:2px;}
  .source-error{padding:12px 14px;font-size:11px;color:var(--danger);background:rgba(232,90,90,.06);border:1px solid rgba(232,90,90,.2);border-radius:2px;}
  .source-content{background:rgba(232,180,90,.04);border:1px solid rgba(232,180,90,.18);border-radius:2px;overflow:hidden;}
  .source-row{display:flex;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(232,180,90,.08);align-items:flex-start;}
  .source-row:last-child{border-bottom:none;}
  .source-label{font-size:10px;letter-spacing:1px;color:var(--accent);white-space:nowrap;min-width:90px;padding-top:1px;}
  .source-val{font-size:12px;color:var(--text);line-height:1.6;font-family:'Fraunces',serif;font-weight:300;}
  .source-explain{background:rgba(90,232,160,.04);}
  .source-explain .source-label{color:var(--success);}

  /* Source inline edit */
  .src-edit-row{background:rgba(0,0,0,.15);border-top:1px solid rgba(232,180,90,.1)!important;}
  .src-edit-btn{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:2px;cursor:pointer;transition:all .15s;}
  .src-edit-btn{background:rgba(232,180,90,.08);border:1px solid rgba(232,180,90,.2);color:var(--accent);}
  .src-edit-btn:hover{background:rgba(232,180,90,.18);}
  .src-edit-save{background:rgba(90,232,160,.08)!important;border-color:rgba(90,232,160,.25)!important;color:var(--success)!important;}
  .src-edit-save:hover{background:rgba(90,232,160,.18)!important;}
  .src-edit-cancel{background:transparent!important;border-color:var(--border)!important;color:var(--muted)!important;}
  .src-edit-cancel:hover{border-color:var(--danger)!important;color:var(--danger)!important;}
  .src-edit-input{background:var(--surface2);border:1px solid var(--accent);border-radius:2px;padding:6px 10px;color:var(--text);font-family:'Fraunces',serif;font-size:13px;font-weight:300;outline:none;width:100%;line-height:1.5;}
  .src-textarea{resize:vertical;min-height:60px;}
  .src-pdf-btn{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:2px;cursor:pointer;transition:all .15s;background:rgba(232,180,90,.08);border:1px solid rgba(232,180,90,.2);color:var(--accent);}
  .src-pdf-btn:hover{background:rgba(232,180,90,.2);}
  .src-pdf-dl{background:transparent!important;border-color:var(--border)!important;color:var(--muted)!important;}
  .src-pdf-dl:hover{border-color:var(--accent)!important;color:var(--accent)!important;background:transparent!important;}

  .q-btn.edit:hover{color:var(--accent);}

  /* Edit modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:2px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;}
  .modal-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
  .modal-head-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0;}
  .modal-close:hover{color:var(--text);}
  .modal-body{padding:24px;display:flex;flex-direction:column;gap:18px;}
  .modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface);}
  .modal-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .modal-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:10px 12px;color:var(--text);font-family:'Fraunces',serif;font-size:14px;font-weight:300;outline:none;resize:vertical;min-height:80px;line-height:1.6;transition:border-color .2s;}
  .modal-textarea:focus{border-color:var(--accent);}
  .modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:2px;padding:10px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;}
  .modal-input:focus{border-color:var(--accent);}
  .opt-row{display:flex;align-items:center;gap:10px;}
  .opt-key{width:28px;height:28px;border-radius:50%;background:rgba(90,143,232,.12);border:1px solid rgba(90,143,232,.3);color:var(--accent2);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .correct-radio{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;color:var(--muted);white-space:nowrap;}
  .correct-radio input{accent-color:var(--success);}
  .correct-radio.selected{color:var(--success);}
  .btn-save{padding:10px 24px;background:var(--accent);border:none;border-radius:2px;color:#0d0f14;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
  .btn-save:hover{background:#f0c46a;}
  .btn-cancel{padding:10px 20px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
  .btn-cancel:hover{border-color:var(--accent);color:var(--accent);}

  /* PDF viewer modal */
  .pdf-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:4000;display:flex;flex-direction:column;}
  .pdf-modal-head{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0;}
  .pdf-modal-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
  .pdf-modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;}
  .pdf-modal-close:hover{color:var(--text);}
  .pdf-modal-body{flex:1;overflow:hidden;}
  .pdf-modal-body iframe{width:100%;height:100%;border:none;display:block;}
  .empty-state{text-align:center;padding:80px 20px;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:16px;opacity:.4;}
  .empty-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--muted);margin-bottom:8px;}
  .empty-sub{font-size:12px;line-height:1.6;max-width:300px;margin:0 auto;}

  /* Toast */
  .toast{position:fixed;bottom:32px;right:32px;background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:14px 20px;font-size:12px;z-index:1000;animation:toastIn .3s ease;max-width:320px;}
  .toast.success{border-color:rgba(90,232,160,.3);color:var(--success);}
  .toast.error{border-color:rgba(232,90,90,.3);color:var(--danger);}
  .toast.info{border-color:rgba(232,180,90,.3);color:var(--accent);}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  @media(max-width:800px){
    .main-grid{grid-template-columns:1fr;}
    .header-inner{flex-direction:column;align-items:flex-start;}
    .stats-bar{gap:20px;}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-tag">AI Powered</span>
        <h1 class="logo-title">Soru <span>Havuzu</span></h1>
      </div>
      <div class="stats-bar">
        <div class="stat"><div class="stat-num" id="totalQuestions">0</div><div class="stat-label">Toplam Soru</div></div>
        <div class="stat"><div class="stat-num" id="totalTopics">0</div><div class="stat-label">Konu</div></div>
        <div class="stat"><div class="stat-num" id="totalPDFs">0</div><div class="stat-label">PDF</div></div>
      </div>
    </div>
  </header>

  <div class="main-grid">
    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot"></div>
          <span class="panel-title">PDF Yükle &amp; Soru Üret</span>
        </div>
        <div class="panel-body">
          <div class="form-group">
            <label class="form-label">PDF Dosyası</label>
            <input type="file" accept=".pdf" id="fileInput" style="display:none">
            <div class="drop-zone" id="dropZone">
              <span class="drop-icon">📄</span>
              <div class="drop-text"><strong>Dosya seç</strong> veya sürükle bırak<br>Sadece PDF dosyaları</div>
            </div>
            <div class="file-selected" id="fileSelected" style="display:none">
              <span>📎</span>
              <span id="fileName"></span>
              <span class="file-change" id="fileChange">↺ Değiştir</span>
            </div>
          </div>

          <div class="form-group">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
              <label class="form-label" style="margin-bottom:0">Konu Adı</label>
              <span id="autoFillBadge" style="display:none;font-size:9px;letter-spacing:1px;color:var(--accent);background:rgba(232,180,90,.08);border:1px solid rgba(232,180,90,.2);padding:2px 8px;border-radius:20px;">✦ PDF'den alındı</span>
            </div>
            <input type="text" class="form-input" id="topicInput" placeholder="Önce PDF yükle, otomatik dolar...">
          </div>

          <div class="form-group">
            <label class="form-label">Kaç Soru Üretilsin?</label>
            <div class="count-row">
              <button class="count-btn active" data-count="3">3</button>
              <button class="count-btn" data-count="5">5</button>
              <button class="count-btn" data-count="10">10</button>
              <button class="count-btn" data-count="15">15</button>
            </div>
          </div>

          <button class="btn-generate" id="generateBtn" onclick="generateQuestions()">✦ Soru Üret</button>
        </div>
      </div>

      <div class="panel" style="margin-top:16px">
        <div class="panel-header">
          <div class="panel-dot" style="background:var(--accent2)"></div>
          <span class="panel-title">Konular</span>
        </div>
        <div class="panel-body" id="topicsList">
          <div style="font-size:12px;color:var(--muted);text-align:center;padding:12px 0">Henüz konu eklenmedi</div>
        </div>
      </div>
    </div>

    <div>
      <div class="pool-header">
        <h2 class="pool-title">Soru Havuzu</h2>
        <div class="pool-actions">
          <button class="btn-sm" onclick="exportQuestions()">↓ Dışa Aktar</button>
          <button class="btn-sm btn-danger" onclick="clearAll()">✕ Temizle</button>
        </div>
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-tab active" onclick="filterQuestions('all',this)">Tümü</button>
      </div>
      <div id="questionPool">
        <div class="empty-state">
          <div class="empty-icon">🎯</div>
          <div class="empty-title">Soru Havuzu Boş</div>
          <div class="empty-sub">Sol taraftan bir PDF yükleyip soru üretmeye başlayın.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
function safeLoad(k,fb){try{return JSON.parse(localStorage.getItem(k))||fb;}catch(e){return fb;}}
var questions = safeLoad('soruHavuzu',[]);
var topics    = safeLoad('soruKonular',{});
var topicPDFs = safeLoad('soruTopicPDFs',{});
var selectedCount = 3;
var selectedFile  = null;
var currentFilter = 'all';

function save(){
  localStorage.setItem('soruHavuzu',JSON.stringify(questions));
  localStorage.setItem('soruKonular',JSON.stringify(topics));
  try{localStorage.setItem('soruTopicPDFs',JSON.stringify(topicPDFs));}catch(e){}
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderAll();

document.querySelectorAll('.count-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.count-btn').forEach(function(b){b.classList.remove('active');});

document.getElementById('dropZone').addEventListener('click',function(){
  document.getElementById('fileInput').click();
});
document.getElementById('fileChange').addEventListener('click',function(){
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change',function(e){
  if(e.target.files[0]) handleFile(e.target.files[0]);
  e.target.value='';
});

var dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',function(){dz.classList.remove('drag-over');});
dz.addEventListener('drop',function(e){
  e.preventDefault();dz.classList.remove('drag-over');
  var f=e.dataTransfer.files[0];
  if(f&&f.type==='application/pdf') handleFile(f);
  else showToast('Lütfen PDF dosyası seçin','error');

// ─── FILE ────────────────────────────────────────────────────────────────────
function handleFile(file){
  selectedFile=file;
  document.getElementById('fileSelected').style.display='flex';
  document.getElementById('dropZone').style.display='none';
  document.getElementById('fileName').textContent=file.name;

  var topicInput=document.getElementById('topicInput');
  var autoName=file.name.replace(/\.pdf$/i,'').replace(/[-_]/g,' ').trim();
  topicInput.value=autoName;

  var badge=document.getElementById('autoFillBadge');
  badge.style.display='inline-block';
  badge.textContent="✦ PDF'den alındı";
  badge.style.color='var(--accent)';

  topicInput.style.borderColor='var(--accent)';
  topicInput.style.background='rgba(232,180,90,.06)';
  topicInput.focus();topicInput.select();

  topicInput.addEventListener('blur',function(){
    topicInput.style.borderColor='';topicInput.style.background='';
  },{once:true});

  // remove old listener before adding new one
  topicInput.oninput=function(){
    if(topicInput.value!==autoName){
      badge.textContent='✎ Düzenlendi';badge.style.color='var(--accent2)';
    } else {
      badge.textContent="✦ PDF'den alındı";badge.style.color='var(--accent)';
    }
  };
}

function fileToBase64(file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result.split(',')[1]);};
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// ─── GENERATE ────────────────────────────────────────────────────────────────
async function generateQuestions(){
  var topic=document.getElementById('topicInput').value.trim();
  if(!topic){showToast('Lütfen konu adı girin','error');return;}
  if(!selectedFile){showToast('Lütfen bir PDF dosyası seçin','error');return;}
  var btn=document.getElementById('generateBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Üretiliyor...';
  try{
    var b64=await fileToBase64(selectedFile);
    await runGenerate(topic,b64);
  }catch(err){
    showToast('Hata: '+(err.message||'Soru üretilemedi'),'error');
  }
  btn.disabled=false;
  btn.innerHTML='✦ Soru Üret';
}

async function runGenerate(topic,base64){
  var prompt='Bu PDF belgesini analiz et ve "'+topic+'" konusundan '+selectedCount+' adet coktan secmeli soru uret.\n\n'
    +'Kurallar:\n- Her soru PDF icerigine dayali olsun\n- Farkli zorluk seviyelerinde olsun\n'
    +'- Her sorunun tam olarak 4 sikki olsun (A, B, C, D)\n- Siklar makul ve yaniltici olsun, biri dogru olsun\n'
    +'- Baska hicbir aciklama veya metin ekleme\n\n'
    +'Yanlityi SADECE asagidaki JSON formatinda ver, markdown veya baska hicbir sey ekleme:\n'
    +'{"sorular":[{"soru":"Soru metni?","secenekler":{"A":"...","B":"...","C":"...","D":"..."},"dogru":"A"}]}';

  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:2500,
      messages:[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},
        {type:'text',text:prompt}
      ]}]
    })
  });

  var data=await resp.json();
  var raw=data.content.map(function(c){return c.text||'';}).join('');
  var parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
  var newQs=parsed.sorular||[];
  if(!newQs.length) throw new Error('Soru üretilemedi');

  newQs.forEach(function(q){
    questions.push({
      id:Date.now()+'_'+Math.random().toString(36).slice(2),
      text:q.soru, options:q.secenekler, correct:q.dogru, topic:topic,
      time:new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}),
      date:new Date().toLocaleDateString('tr-TR')
    });
  });
  topics[topic]=(topics[topic]||0)+newQs.length;
  topicPDFs[topic]=base64;
  save(); renderAll(); filterQuestions(topic,null);
  showToast(newQs.length+' soru eklendi → '+topic,'success');
}

async function regenTopic(topic){
  var b64=topicPDFs[topic];
  if(!b64){showToast('Bu konunun PDF verisi bulunamadı','error');return;}
  var btn=document.getElementById('generateBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Üretiliyor...';
  document.getElementById('topicInput').value=topic;
  try{await runGenerate(topic,b64);}
  catch(err){showToast('Hata: '+(err.message||'Soru üretilemedi'),'error');}
  btn.disabled=false;btn.innerHTML='✦ Soru Üret';
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll(){
  document.getElementById('totalQuestions').textContent=questions.length;
  document.getElementById('totalTopics').textContent=Object.keys(topics).length;
  document.getElementById('totalPDFs').textContent=Object.keys(topics).length;
  renderTopics(); renderFilters(); renderQuestions();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function renderTopics(){
  var list=document.getElementById('topicsList');
  var keys=Object.keys(topics);
  if(!keys.length){list.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px 0">Henüz konu eklenmedi</div>';return;}
  list.innerHTML=keys.map(function(t){
    var s=escAttr(t);
    return '<div class="topic-chip'+(currentFilter===t?' active':'')+'" onclick="filterQuestions(\''+s+'\',null)">'
      +'<span class="topic-name">'+esc(t)+'</span>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span class="topic-count">'+topics[t]+'</span>'
      +(topicPDFs[t]?'<button class="topic-regen-btn" onclick="event.stopPropagation();regenTopic(\''+s+'\')">＋ Üret</button>':'')
      +'</div></div>';
  }).join('');
}

function renderFilters(){
  var keys=Object.keys(topics);
  var html='<button class="filter-tab'+(currentFilter==='all'?' active':'')+'" onclick="filterQuestions(\'all\',this)">Tümü</button>';
  keys.forEach(function(t){
    var s=escAttr(t);
    html+='<button class="filter-tab'+(currentFilter===t?' active':'')+'" onclick="filterQuestions(\''+s+'\',this)">'+esc(t)+'</button>';
  });
  document.getElementById('filterRow').innerHTML=html;
}

function filterQuestions(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('.filter-tab').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.filter-tab').forEach(function(b){
    if((filter==='all'&&b.textContent==='Tümü')||b.textContent===filter) b.classList.add('active');
  });
  renderTopics(); renderQuestions();
}

function renderQuestions(){
  var pool=document.getElementById('questionPool');
  var filtered=currentFilter==='all'?questions:questions.filter(function(q){return q.topic===currentFilter;});
  if(!filtered.length){
    pool.innerHTML='<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-title">Soru Havuzu Boş</div><div class="empty-sub">Sol taraftan bir PDF yükleyip soru üretmeye başlayın.</div></div>';
    return;
  }
  var html='';
  filtered.slice().reverse().forEach(function(q,i){
    var sid=escAttr(q.id); var sc=escAttr(q.correct||'');
    var opts='';
    if(q.options) Object.keys(q.options).forEach(function(k){
      opts+='<div class="q-option" onclick="selectOption(this,\''+sid+'\',\''+k+'\',\''+sc+'\')"><span class="q-opt-label">'+k+'</span><span class="q-opt-text">'+esc(q.options[k])+'</span></div>';
    });
    html+='<div class="question-card" id="qcard-'+sid+'">'
      +'<div class="question-meta"><span class="q-topic">'+esc(q.topic)+'</span><span class="q-num">#'+(filtered.length-i)+'</span><span class="q-time">'+esc(q.date)+' '+esc(q.time)+'</span></div>'
      +'<div class="question-text">'+esc(q.text)+'</div>'
      +(opts?'<div class="q-options" id="opts-'+sid+'">'+opts+'</div>':'')
      +'<div id="source-'+sid+'" class="q-source-box" style="display:none"></div>'
      +'<div class="question-actions">'
      +'<button class="q-btn" onclick="copyQuestion(\''+sid+'\')">⊕ Kopyala</button>'
      +'<button class="q-btn edit" onclick="editQuestion(\''+sid+'\')">✎ Düzenle</button>'
      +'<button class="q-btn src" id="srcbtn-'+sid+'" onclick="toggleSource(\''+sid+'\')">⊙ Kaynağı Göster</button>'
      +'<button class="q-btn delete" onclick="deleteQuestion(\''+sid+'\')">✕ Sil</button>'
      +'</div></div>';
  });
  pool.innerHTML=html;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function selectOption(el,qid,key,correct){
  var c=document.getElementById('opts-'+qid);
  if(!c||c.classList.contains('answered')) return;
  c.classList.add('answered');
  c.querySelectorAll('.q-option').forEach(function(o){
    var k=o.querySelector('.q-opt-label').textContent;
    if(k===correct) o.classList.add('correct');
    else if(k===key) o.classList.add('wrong');
    else o.classList.add('dimmed');
  });
}

function copyQuestion(id){
  var q=questions.find(function(q){return q.id===id;});
  if(!q) return;
  var text=q.text;
  if(q.options) Object.keys(q.options).forEach(function(k){text+='\n'+k+') '+q.options[k];});
  if(q.correct) text+='\nDoğru Cevap: '+q.correct;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){showToast('Soru kopyalandı ✓','success');}).catch(function(){fallbackCopy(text);});
  } else fallbackCopy(text);
}

function fallbackCopy(text){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast('Soru kopyalandı ✓','success');}
  catch(e){showToast('Kopyalama başarısız','error');}
  document.body.removeChild(ta);
}

function deleteQuestion(id){
  questions=questions.filter(function(q){return q.id!==id;});
  topics={};questions.forEach(function(q){topics[q.topic]=(topics[q.topic]||0)+1;});
  save();renderAll();
}

function clearAll(){
  if(!questions.length) return;
  showConfirm('Tüm sorular silinsin mi?',function(){
    questions=[];topics={};topicPDFs={};currentFilter='all';
    save();renderAll();showToast('Havuz temizlendi','info');
  });
}

function exportQuestions(){
  if(!questions.length){showToast('Dışa aktarılacak soru yok','error');return;}
  var filtered=currentFilter==='all'?questions:questions.filter(function(q){return q.topic===currentFilter;});
  var text=filtered.map(function(q,i){
    var s=(i+1)+'. ['+q.topic+'] '+q.text;
    if(q.options) Object.keys(q.options).forEach(function(k){s+='\n   '+k+') '+q.options[k];});
    if(q.correct) s+='\n   ✓ Doğru Cevap: '+q.correct;
    return s;
  }).join('\n\n');
  var blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='soru-havuzu-'+(currentFilter==='all'?'tumu':currentFilter)+'.txt';
  a.style.display='none';document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  showToast(filtered.length+' soru dışa aktarıldı ✓','success');
}

// ─── EDIT QUESTION ────────────────────────────────────────────────────────────
function editQuestion(id){
  var q=questions.find(function(q){return q.id===id;});
  if(!q) return;

  var ov=document.createElement('div');
  ov.className='modal-overlay';

  var optKeys=['A','B','C','D'];
  var optsHtml=optKeys.map(function(k){
    var val=(q.options&&q.options[k])||'';
    var isCorrect=q.correct===k;
    return '<div class="opt-row">'
      +'<div class="opt-key">'+k+'</div>'
      +'<input class="modal-input" id="opt_'+k+'" value="'+esc(val)+'" style="flex:1" placeholder="'+k+' şıkkı...">'
      +'<label class="correct-radio'+(isCorrect?' selected':'')+'" id="lbl_'+k+'">'
      +'<input type="radio" name="correct_'+id+'" value="'+k+'"'+(isCorrect?' checked':'')+' onchange="document.querySelectorAll(\'[id^=lbl_]\').forEach(function(l){l.classList.remove(\'selected\')});this.closest(\'.correct-radio\').classList.add(\'selected\')">'
      +'Doğru</label>'
      +'</div>';
  }).join('');

  ov.innerHTML='<div class="modal-box">'
    +'<div class="modal-head"><span class="modal-head-title">✎ Soruyu Düzenle</span><button class="modal-close" id="mClose">✕</button></div>'
    +'<div class="modal-body">'
    +'<div><div class="modal-label">Soru Metni</div><textarea class="modal-textarea" id="editText">'+esc(q.text)+'</textarea></div>'
    +'<div><div class="modal-label">Şıklar &amp; Doğru Cevap</div><div style="display:flex;flex-direction:column;gap:8px">'+optsHtml+'</div></div>'
    +'</div>'
    +'<div class="modal-foot"><button class="btn-cancel" id="mCancel">İptal</button><button class="btn-save" id="mSave">✦ Kaydet</button></div>'
    +'</div>';

  document.body.appendChild(ov);

  ov.querySelector('#mClose').onclick=function(){document.body.removeChild(ov);};
  ov.querySelector('#mCancel').onclick=function(){document.body.removeChild(ov);};
  ov.addEventListener('click',function(e){if(e.target===ov)document.body.removeChild(ov);});

  ov.querySelector('#mSave').onclick=function(){
    var newText=ov.querySelector('#editText').value.trim();
    if(!newText){showToast('Soru metni boş olamaz','error');return;}
    var newOpts={};
    var allFilled=true;
    optKeys.forEach(function(k){
      var v=ov.querySelector('#opt_'+k).value.trim();
      if(!v) allFilled=false;
      newOpts[k]=v;
    });
    if(!allFilled){showToast('Tüm şıkları doldurun','error');return;}
    var checkedRadio=ov.querySelector('input[name="correct_'+id+'"]:checked');
    if(!checkedRadio){showToast('Doğru cevabı seçin','error');return;}
    var newCorrect=checkedRadio.value;

    // Apply changes
    var idx=questions.findIndex(function(q){return q.id===id;});
    if(idx>-1){
      questions[idx].text=newText;
      questions[idx].options=newOpts;
      questions[idx].correct=newCorrect;
      save(); renderQuestions();
      showToast('Soru güncellendi ✓','success');
    }
    document.body.removeChild(ov);
  };
}

// ─── OPEN PDF ─────────────────────────────────────────────────────────────────
function openPDF(topic){
  var b64=topicPDFs[topic];
  if(!b64){showToast('PDF verisi bulunamadı','error');return;}
  try{
    var byteChars=atob(b64);
    var byteArr=new Uint8Array(byteChars.length);
    for(var i=0;i<byteChars.length;i++) byteArr[i]=byteChars.charCodeAt(i);
    var blob=new Blob([byteArr],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var win=window.open(url,'_blank');
    if(!win){
      // popup blocked — fallback: download
      var a=document.createElement('a');
      a.href=url; a.download=topic+'.pdf';
      a.style.display='none';
      document.body.appendChild(a); a.click();
      setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
      showToast('Popup engellendi, PDF indiriliyor...','info');
    } else {
      setTimeout(function(){URL.revokeObjectURL(url);},10000);
    }
  }catch(e){showToast('PDF açılamadı: '+e.message,'error');}
}


async function toggleSource(id){
  var box=document.getElementById('source-'+id);
  var btn=document.getElementById('srcbtn-'+id);
  if(!box) return;
  if(box.style.display==='block'){
    box.style.display='none';btn.textContent='⊙ Kaynağı Göster';btn.classList.remove('active');return;
  }
  btn.textContent='⊙ Kaynağı Gizle';btn.classList.add('active');

  var q=questions.find(function(q){return q.id===id;});
  if(!q) return;

  // If already stored, just render (no API call)
  if(q.sourceInfo){
    box.style.display='block';
    renderSourceBox(box,id,q.sourceInfo,q.topic);
    return;
  }

  var b64=topicPDFs[q.topic];
  box.style.display='block';

  if(!b64){
    box.innerHTML='<div class="source-error">⚠ Bu konunun PDF verisi bulunamadı.</div>';return;
  }

  box.innerHTML='<div class="source-loading"><span style="display:inline-block;width:10px;height:10px;border:2px solid rgba(232,180,90,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle;"></span>PDF\'de ilgili bölüm aranıyor...</div>';

  try{
    var prompt='Asagidaki soru bu PDF belgesinden uretilmistir:\n\n"'+q.text+'"\n\n'
      +'Bu sorunun PDF\'de hangi bolum, baslik veya sayfaya ait oldugunu bul.\n'
      +'SADECE JSON formatinda yanit ver:\n'
      +'{"bolum":"Bolum adi","ozet":"Ilgili icerik ozeti","konum":"PDF konumu","dogru_cevap_aciklama":"Neden dogru"}';

    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:800,
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
          {type:'text',text:prompt}
        ]}]
      })
    });
    var data=await resp.json();
    var raw=data.content.map(function(c){return c.text||'';}).join('');
    var info=JSON.parse(raw.replace(/```json|```/g,'').trim());

    // Store in question object
    var idx=questions.findIndex(function(q){return q.id===id;});
    if(idx>-1){ questions[idx].sourceInfo=info; save(); }

    renderSourceBox(box,id,info,q.topic);
  }catch(err){
    box.innerHTML='<div class="source-error">⚠ Kaynak bulunamadı: '+esc(err.message)+'</div>';
  }
}

  var sid=escAttr(id);
  var stopic=escAttr(topic);
  box.innerHTML='<div class="source-content" id="srcview-'+sid+'">'
    +srcRow('📂 Bölüm',   info.bolum||'',               'bolum',sid)
    +srcRow('📍 Konum',   info.konum||'',               'konum',sid)
    +srcRow('📄 İçerik',  info.ozet||'',                'ozet', sid, true)
    +srcRowExplain(info.dogru_cevap_aciklama||'',        sid,    true)
    +'<div class="source-row src-edit-row">'
    +'<span style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%">'
    +'<button class="src-edit-btn" onclick="toggleSourceEdit(\''+sid+'\')">✎ Düzenle</button>'
    +'<button class="src-edit-btn src-edit-save" id="srcSave-'+sid+'" style="display:none" onclick="saveSourceEdit(\''+id+'\')">✦ Kaydet</button>'
    +'<button class="src-edit-btn src-edit-cancel" id="srcCancel-'+sid+'" style="display:none" onclick="cancelSourceEdit(\''+sid+'\')">✕ İptal</button>'
    +'<span style="flex:1"></span>'
    +'<button onclick="openPDF(\''+stopic+'\')" class="src-pdf-btn">↗ Yeni Sekmede Aç</button>'
    +'<button onclick="downloadPDF(\''+stopic+'\')" class="src-pdf-btn src-pdf-dl">↓ İndir</button>'
    +'</span></div>'
    +'</div>';
}

function srcRow(label, val, field, sid, tall){
  return '<div class="source-row">'
    +'<span class="source-label">'+label+'</span>'
    +'<span class="source-val src-display" id="disp_'+field+'_'+sid+'">'+esc(val||'—')+'</span>'
    +(tall
      ? '<textarea class="src-edit-input src-textarea" id="inp_'+field+'_'+sid+'" style="display:none">'+esc(val)+'</textarea>'
      : '<input  class="src-edit-input" id="inp_'+field+'_'+sid+'" value="'+esc(val)+'" style="display:none">')
    +'</div>';
}

function srcRowExplain(val, sid, tall){
  return '<div class="source-row source-explain">'
    +'<span class="source-label">✓ Doğru Cevap</span>'
    +'<span class="source-val src-display" id="disp_dogru_'+sid+'">'+esc(val||'—')+'</span>'
    +'<textarea class="src-edit-input src-textarea" id="inp_dogru_'+sid+'" style="display:none">'+esc(val)+'</textarea>'
    +'</div>';
}

function toggleSourceEdit(sid){
  var fields=['bolum','konum','ozet','dogru'];
  var isEditing=document.getElementById('inp_bolum_'+sid).style.display!=='none';
  fields.forEach(function(f){
    var disp=document.getElementById('disp_'+f+'_'+sid);
    var inp =document.getElementById('inp_'+f+'_'+sid);
    if(!disp||!inp) return;
    if(isEditing){
      disp.style.display=''; inp.style.display='none';
    } else {
      // populate input from current display text
      var cur=disp.textContent==='—'?'':disp.textContent;
      if(inp.tagName==='TEXTAREA') inp.value=cur; else inp.value=cur;
      disp.style.display='none'; inp.style.display='';
    }
  });
  var saveBtn=document.getElementById('srcSave-'+sid);
  var cancelBtn=document.getElementById('srcCancel-'+sid);
  if(saveBtn){ saveBtn.style.display=isEditing?'none':'inline-block'; }
  if(cancelBtn){ cancelBtn.style.display=isEditing?'none':'inline-block'; }
}

function cancelSourceEdit(sid){
  toggleSourceEdit(sid); // just toggle back
}

function saveSourceEdit(id){
  var sid=escAttr(id);
  var fields=['bolum','konum','ozet','dogru'];
  var newInfo={};
  fields.forEach(function(f){
    var inp=document.getElementById('inp_'+f+'_'+sid);
    newInfo[f]=inp?inp.value.trim():'';
  });
  var info={
    bolum:newInfo.bolum,
    konum:newInfo.konum,
    ozet:newInfo.ozet,
    dogru_cevap_aciklama:newInfo.dogru
  };
  var idx=questions.findIndex(function(q){return q.id===id;});
  if(idx>-1){ questions[idx].sourceInfo=info; save(); }

  // Re-render
  var box=document.getElementById('source-'+id);
  var q=questions.find(function(q){return q.id===id;});
  if(box&&q) renderSourceBox(box,id,info,q.topic);
  showToast('Kaynak bilgisi güncellendi ✓','success');
}


function downloadPDF(topic){
  var b64=topicPDFs[topic];
  if(!b64){showToast('PDF verisi bulunamadı','error');return;}
  try{
    var byteChars=atob(b64);
    var byteArr=new Uint8Array(byteChars.length);
    for(var i=0;i<byteChars.length;i++) byteArr[i]=byteChars.charCodeAt(i);
    var blob=new Blob([byteArr],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=topic+'.pdf';
    a.style.display='none';
    document.body.appendChild(a); a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
    showToast('PDF indiriliyor...','info');
  }catch(e){showToast('PDF indirilemedi: '+e.message,'error');}
}


function showToast(msg,type){
  var t=document.createElement('div');
  t.className='toast '+(type||'info');t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},3000);
}

function showConfirm(msg,onYes){
  var ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:flex;align-items:center;justify-content:center;';
  var bx=document.createElement('div');
  bx.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:28px 32px;max-width:340px;width:90%;';
  bx.innerHTML='<div style="font-family:Fraunces,serif;font-size:16px;color:var(--text);margin-bottom:20px;">'+msg+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:flex-end;">'
    +'<button id="cNo" style="padding:8px 20px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:monospace;font-size:11px;cursor:pointer;">İptal</button>'
    +'<button id="cYes" style="padding:8px 20px;background:var(--danger);border:none;border-radius:2px;color:#fff;font-family:monospace;font-size:11px;cursor:pointer;">Evet, Sil</button>'
    +'</div>';
  ov.appendChild(bx);document.body.appendChild(ov);
  bx.querySelector('#cYes').onclick=function(){document.body.removeChild(ov);onYes();};
  bx.querySelector('#cNo').onclick=function(){document.body.removeChild(ov);};
}
</script>
</body>
